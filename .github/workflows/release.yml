name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            native/kreepto-rust/target
          key: windows-cargo-${{ hashFiles('native/kreepto-rust/Cargo.toml') }}
          restore-keys: windows-cargo-

      - name: Build kreepto native library
        run: cargo build --release
        working-directory: native/kreepto-rust

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - run: flutter pub get
      - run: flutter build windows --release

      - name: Bundle native library
        run: cp native/kreepto-rust/target/release/kreepto.dll build/windows/x64/runner/Release/

      - name: Package
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}" -replace '/', '-'
          Compress-Archive -Path build/windows/x64/runner/Release/* -DestinationPath "KeeVault-$tag-windows-x64.zip"

      - uses: actions/upload-artifact@v4
        with:
          name: windows
          path: KeeVault-*.zip

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            native/kreepto-rust/target
          key: linux-cargo-${{ hashFiles('native/kreepto-rust/Cargo.toml') }}
          restore-keys: linux-cargo-

      - name: Build kreepto native library
        run: cargo build --release
        working-directory: native/kreepto-rust

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - run: sudo apt-get update && sudo apt-get install -y ninja-build libgtk-3-dev clang cmake pkg-config libsecret-1-dev libayatana-appindicator3-dev
      - run: flutter pub get
      - run: flutter build linux --release

      - name: Bundle native library
        run: cp native/kreepto-rust/target/release/libkreepto.so build/linux/x64/release/bundle/lib/

      - name: Package tar.gz
        run: |
          tag="${{ github.ref_name }}"
          tag="${tag//\//-}"
          tar -czf "KeeVault-${tag}-linux-x64.tar.gz" -C build/linux/x64/release/bundle .

      - name: Package deb
        run: |
          tag="${{ github.ref_name }}"
          version="${tag#v}"
          pkg_dir="keevault_${version}_amd64"
          mkdir -p "$pkg_dir/DEBIAN"
          mkdir -p "$pkg_dir/opt/keevault"
          mkdir -p "$pkg_dir/usr/share/applications"
          mkdir -p "$pkg_dir/usr/share/icons/hicolor/256x256/apps"
          mkdir -p "$pkg_dir/usr/bin"

          # Control file
          cat > "$pkg_dir/DEBIAN/control" << 'CTRL'
          Package: keevault
          Version: VERSION_PLACEHOLDER
          Section: utils
          Priority: optional
          Architecture: amd64
          Maintainer: KeeVault
          Depends: libgtk-3-0, libsecret-1-0, libayatana-appindicator3-1, libdbus-1-3
          Description: A KeePass-compatible password manager
          CTRL
          sed -i 's/^          //' "$pkg_dir/DEBIAN/control"
          sed -i "s/VERSION_PLACEHOLDER/$version/" "$pkg_dir/DEBIAN/control"

          # Copy build files
          cp -r build/linux/x64/release/bundle/* "$pkg_dir/opt/keevault/"

          # Symlink to /usr/bin
          ln -s /opt/keevault/keevault "$pkg_dir/usr/bin/keevault"

          # Desktop entry
          cat > "$pkg_dir/usr/share/applications/keevault.desktop" << 'DESKTOP'
          [Desktop Entry]
          Name=KeeVault
          Comment=A KeePass-compatible password manager
          Exec=/opt/keevault/keevault
          Icon=keevault
          Type=Application
          Categories=Utility;
          DESKTOP
          sed -i 's/^          //' "$pkg_dir/usr/share/applications/keevault.desktop"

          # Icon (use linux/flutter/icon.png if available, otherwise skip)
          if [ -f linux/flutter/icon.png ]; then
            cp linux/flutter/icon.png "$pkg_dir/usr/share/icons/hicolor/256x256/apps/keevault.png"
          fi

          dpkg-deb --build "$pkg_dir"

      - uses: actions/upload-artifact@v4
        with:
          name: linux
          path: |
            KeeVault-*.tar.gz
            keevault_*.deb

  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            native/kreepto-rust/target
          key: android-cargo-${{ hashFiles('native/kreepto-rust/Cargo.toml') }}
          restore-keys: android-cargo-

      - name: Build kreepto for Android
        run: |
          set -e
          NDK_ROOT="${ANDROID_NDK_LATEST_HOME:-$ANDROID_NDK_ROOT}"
          if [ -z "$NDK_ROOT" ]; then
            echo "ERROR: Android NDK not found" >&2
            exit 1
          fi
          TOOLCHAIN="$NDK_ROOT/toolchains/llvm/prebuilt/linux-x86_64"

          mkdir -p native/kreepto-rust/.cargo
          cat > native/kreepto-rust/.cargo/config.toml << EOF
          [target.aarch64-linux-android]
          linker = "$TOOLCHAIN/bin/aarch64-linux-android35-clang"
          ar = "$TOOLCHAIN/bin/llvm-ar"

          [target.armv7-linux-androideabi]
          linker = "$TOOLCHAIN/bin/armv7a-linux-androideabi35-clang"
          ar = "$TOOLCHAIN/bin/llvm-ar"

          [target.x86_64-linux-android]
          linker = "$TOOLCHAIN/bin/x86_64-linux-android35-clang"
          ar = "$TOOLCHAIN/bin/llvm-ar"
          EOF
          sed -i 's/^          //' native/kreepto-rust/.cargo/config.toml

          cd native/kreepto-rust
          cargo build --release --target aarch64-linux-android
          cargo build --release --target armv7-linux-androideabi
          cargo build --release --target x86_64-linux-android

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: printf '%s' "$KEYSTORE_BASE64" | tr -d '[:space:]' | base64 -d > keevault.jks

      - name: Create key.properties
        env:
          STORE_PASSWORD: ${{ secrets.KEYSTORE_STORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEYSTORE_KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEYSTORE_KEY_ALIAS }}
        run: |
          {
            printf 'storePassword=%s\n' "$STORE_PASSWORD"
            printf 'keyPassword=%s\n' "$KEY_PASSWORD"
            printf 'keyAlias=%s\n' "$KEY_ALIAS"
            printf 'storeFile=../../keevault.jks\n'
          } > android/key.properties

      - run: flutter pub get

      - name: Bundle native libraries for Android
        run: |
          for abi in arm64-v8a armeabi-v7a x86_64; do
            mkdir -p android/app/src/main/jniLibs/$abi
          done
          cp native/kreepto-rust/target/aarch64-linux-android/release/libkreepto.so android/app/src/main/jniLibs/arm64-v8a/
          cp native/kreepto-rust/target/armv7-linux-androideabi/release/libkreepto.so android/app/src/main/jniLibs/armeabi-v7a/
          cp native/kreepto-rust/target/x86_64-linux-android/release/libkreepto.so android/app/src/main/jniLibs/x86_64/

      - run: flutter build apk --release --split-per-abi

      - name: Package
        run: |
          tag="${{ github.ref_name }}"
          tag="${tag//\//-}"
          for apk in build/app/outputs/flutter-apk/app-*-release.apk; do
            abi=$(basename "$apk" | sed 's/app-//;s/-release.apk//')
            cp "$apk" "KeeVault-${tag}-android-${abi}.apk"
          done

      - uses: actions/upload-artifact@v4
        with:
          name: android
          path: KeeVault-*.apk

  release:
    needs: [build-windows, build-linux, build-android]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: |
            KeeVault-*
            keevault_*

  publish-aur:
    needs: [release]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Update PKGBUILD version
        run: |
          sed -i "s/pkgver=.*/pkgver=${{ steps.version.outputs.version }}/" PKGBUILD
          sed -i "s/pkgrel=.*/pkgrel=1/" PKGBUILD

      - name: Update .SRCINFO version
        run: |
          sed -i "s/pkgver = .*/pkgver = ${{ steps.version.outputs.version }}/" .SRCINFO
          sed -i "s/pkgrel = .*/pkgrel = 1/" .SRCINFO
          sed -i "s|releases/download/v.*|releases/download/v${{ steps.version.outputs.version }}/KeeVault-v${{ steps.version.outputs.version }}-linux-x64.tar.gz|" .SRCINFO

      - name: Publish to AUR
        env:
          AUR_PKGNAME: keevault-bin
          AUR_USERNAME: ${{ secrets.AUR_USERNAME }}
          AUR_EMAIL: ${{ secrets.AUR_EMAIL }}
          AUR_SSH_PRIVATE_KEY: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          WORKSPACE_DIR="$PWD"

          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$AUR_SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

          ssh-keyscan -t ed25519 aur.archlinux.org >> ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

          export GIT_SSH_COMMAND="ssh -i ~/.ssh/id_ed25519 -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes"

          rm -rf /tmp/local-repo
          echo "=> Cloning existing AUR repository via HTTPS..."

          if git clone "https://aur.archlinux.org/${AUR_PKGNAME}.git" /tmp/local-repo; then
            cd /tmp/local-repo
            git remote set-url origin "ssh://aur@aur.archlinux.org/${AUR_PKGNAME}.git"
          else
            echo "=> HTTPS clone failed, initializing fresh repository..."
            mkdir -p /tmp/local-repo
            cd /tmp/local-repo
            git init -b master
            git remote add origin "ssh://aur@aur.archlinux.org/${AUR_PKGNAME}.git"
          fi

          cp "$WORKSPACE_DIR/PKGBUILD" "$WORKSPACE_DIR/.SRCINFO" .

          git config user.name "$AUR_USERNAME"
          git config user.email "$AUR_EMAIL"

          git add PKGBUILD .SRCINFO
          if [ -z "$(git status --porcelain)" ]; then
            echo "=> No changes, skipping publish."
            exit 0
          fi

          git commit -m "Update ${AUR_PKGNAME} to ${{ steps.version.outputs.version }}"

          echo "=> Pushing to AUR..."
          for i in $(seq 1 5); do
            if git push -u origin master; then
              echo "=> Successfully pushed to AUR!"
              exit 0
            fi
            echo "=> Push failed, retrying in 10s ($i/5)..."
            sleep 10
          done

          echo "=> Failed to push to AUR after 5 retries." >&2
          exit 1
