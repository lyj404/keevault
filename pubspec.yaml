name: keevault
description: "A KeePass-compatible password manager built with Flutter."
publish_to: 'none'
version: 0.4.4+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2

  # KDBX library
  kpasslib: ^1.1.2

  # State management
  flutter_riverpod: ^2.6.1

  # Routing
  go_router: ^14.8.1

  # File picking
  file_picker: ^8.1.7

  # CSV parsing
  csv: ^6.0.0

  # TOTP generation
  otp: ^3.0.0

  # QR code scanning (TOTP setup)
  mobile_scanner: ^5.2.3

  # Platform paths
  path_provider: ^2.1.5

  # Secure storage (recent files only, never passwords)
  flutter_secure_storage: ^9.2.4

  # Biometric authentication (Android only)
  local_auth_android: ^1.0.56

  # System tray & window management
  system_tray: ^2.0.3
  dart_xdg_status_notifier_item: ^1.1.0
  window_manager: ^0.4.3

  # UI helpers
  # Logging
  logger: ^2.5.0

  webdav_client: ^1.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  mocktail: ^1.0.4
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/icons/

  fonts:
    - family: Noto Sans SC
      fonts:
        - asset: assets/fonts/NotoSansSC-Regular.ttf
          weight: 400
        - asset: assets/fonts/NotoSansSC-Bold.ttf
          weight: 700
